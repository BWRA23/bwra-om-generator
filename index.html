<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--surface3:#222;--red:#dc2626;--redDark:#991b1b;--text:#f1f1f1;--muted:#888;--sub:#555;--border:#2a2a2a;--green:#22c55e;--amber:#f59e0b;--blue:#3b82f6;--font:'DM Sans',sans-serif;--fontH:'Barlow Condensed',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
input,select,textarea{font-family:var(--font);background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;font-size:13px;width:100%;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--red)}
textarea{resize:vertical;min-height:80px}
select{cursor:pointer}
button{font-family:var(--font);cursor:pointer;border:none;border-radius:6px;padding:10px 20px;font-size:13px;font-weight:600;transition:all .15s}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#b91c1c}
.btn-dark{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-dark:hover{background:var(--surface3)}
.btn-green{background:var(--green);color:#000}.btn-green:hover{opacity:.9}
.btn-sm{padding:6px 14px;font-size:12px}
label{font-size:12px;color:var(--muted);font-weight:500;display:block;margin-bottom:4px}
.field{margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.photo-drop{border:2px dashed var(--border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;min-height:100px;display:flex;align-items:center;justify-content:center;transition:border .2s;position:relative;overflow:hidden}
.photo-drop:hover{border-color:var(--red)}
.photo-drop img{max-width:100%;max-height:200px;object-fit:contain;border-radius:4px}
.photo-drop input{position:absolute;inset:0;opacity:0;cursor:pointer}
.step-nav{display:flex;gap:4px;margin-bottom:24px}
.step-btn{flex:1;padding:10px;text-align:center;font-size:11px;font-weight:600;border-radius:6px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.step-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
.step-btn.done{background:var(--surface3);color:var(--green);border-color:var(--green)}
.topbar{display:flex;align-items:center;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);gap:16px;position:sticky;top:0;z-index:100}
.topbar h1{font-family:var(--fontH);font-size:20px;font-weight:700;letter-spacing:1px}
.topbar .red{color:var(--red)}
.container{max-width:900px;margin:0 auto;padding:24px}
h2{font-family:var(--fontH);font-size:22px;font-weight:700;margin-bottom:16px;letter-spacing:.5px}
h3{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text)}
.section{margin-bottom:28px}
.tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-left:8px}
.tag-opt{background:var(--surface3);color:var(--muted)}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;width:380px;text-align:center}
.login-box h1{font-family:var(--fontH);font-size:28px;margin-bottom:6px;letter-spacing:2px}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:24px}
.add-row-btn{width:100%;padding:8px;background:var(--surface3);border:1px dashed var(--border);border-radius:6px;color:var(--muted);font-size:12px;cursor:pointer;margin-top:8px}
.add-row-btn:hover{border-color:var(--red);color:var(--text)}
.remove-btn{background:none;border:none;color:var(--sub);font-size:16px;cursor:pointer;padding:2px 6px}.remove-btn:hover{color:var(--red)}
table.fin-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
table.fin-table th{background:var(--red);color:#fff;padding:6px 8px;text-align:left;font-weight:600;font-size:11px}
table.fin-table td{padding:5px 8px;border-bottom:1px solid var(--border)}
table.fin-table input{padding:4px 6px;font-size:12px;border-radius:4px}
.ai-bar{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px}
.ai-bar textarea{flex:1}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#000;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>

<script type="text/babel">

const SB_URL="https://khctptruikafdcxqsvvy.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtoY3RwdHJ1aWthZmRjeHFzdnZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjgzNjAsImV4cCI6MjA4ODYwNDM2MH0.McOv-IDQjDYArugi_QhYJoW9fCItMYF6h6AsDcG1h5g";

async function sbFetch(path,opts={}){
  const token=localStorage.getItem("sb_token");
  const headers={"Content-Type":"application/json","apikey":SB_KEY,...(token?{"Authorization":"Bearer "+token}:{}),...(opts.headers||{})};
  const r=await fetch(SB_URL+path,{...opts,headers});
  if(!r.ok)throw new Error(await r.text());
  const text=await r.text();
  return text?JSON.parse(text):null;
}

async function sbAuth(email,password){
  const r=await fetch(SB_URL+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"Content-Type":"application/json","apikey":SB_KEY},body:JSON.stringify({email,password})});
  if(!r.ok){const e=await r.json();throw new Error(e.error_description||e.msg||"Login failed")}
  return r.json();
}

// ════════════════════════════════════════════════════════

const C={red:"DC2626",dark:"222222",darkBg:"2D2D2D",white:"FFFFFF",offWhite:"F5F5F5",lightGray:"EEEEEE",gray:"999999",black:"000000"};
const FONT="Arial",FONT_BOLD="Arial",FONT_SERIF="Georgia",PW=10,PH=7.5;
function fmt$(n){if(!n&&n!==0)return"$0";return"$"+Number(n).toLocaleString("en-US")}
function fmtNum(n){return n?Number(n).toLocaleString("en-US"):"0"}

function addCoverSlide(p,d){
  const s=p.addSlide();
  if(d.coverPhoto){s.background={data:d.coverPhoto}}else{s.background={color:"3B3B3B"};s.addShape(p.shapes.RECTANGLE,{x:0,y:0,w:PW,h:PH,fill:{color:"000000",transparency:40}})}
  if(d.coverPhoto){s.addShape(p.shapes.RECTANGLE,{x:0,y:0,w:PW,h:PH,fill:{color:"000000",transparency:40}})}
  s.addText([{text:"BRIDGEWATER",options:{fontSize:16,bold:true,color:C.white,charSpacing:2,breakLine:true}},{text:"REALTY ADVISORS",options:{fontSize:7,color:C.white,charSpacing:3}}],{x:0.6,y:0.3,w:3,h:0.65,margin:0});
  s.addText(d.cityState||"",{x:6.5,y:0.35,w:3.2,h:0.4,fontSize:18,fontFace:FONT_SERIF,italic:true,color:C.white,align:"right",margin:0});
  s.addText(d.propertyName||d.address||"",{x:0.5,y:2.5,w:9,h:1.5,fontSize:44,fontFace:FONT_SERIF,italic:true,color:C.white,align:"center",valign:"middle",margin:0});
  s.addText([{text:d.address||"",options:{fontSize:14,italic:true,color:C.white,breakLine:true}},{text:d.unitDescription||"",options:{fontSize:14,italic:true,color:C.white}}],{x:1,y:4.0,w:8,h:0.8,align:"center",margin:0});
  s.addText("Offering Memorandum",{x:5.5,y:5.4,w:4.2,h:0.55,fontSize:22,fontFace:FONT_SERIF,italic:true,bold:true,color:C.white,align:"right",margin:0});
  s.addShape(p.shapes.LINE,{x:6.8,y:5.95,w:2.9,h:0,line:{color:C.white,width:2}});
  s.addText(["Bridgewater Realty Advisors","www.bridgewater.realty",d.officeAddress||"3501 Severn Avenue, Suite 19",d.officeCity||"Metairie, LA, 70002","504-901-0463","Licensed in LA, MS"].join("\n"),{x:5.5,y:6.05,w:4.2,h:1.2,fontSize:8.5,color:C.white,align:"right",margin:0,lineSpacingMultiple:1.3});
}

function addTeamSlide(p,d){
  const s=p.addSlide();s.background={color:C.white};
  if(d.teamPhoto){s.addImage({data:d.teamPhoto,x:0,y:0,w:PW,h:5.0,sizing:{type:"cover",w:PW,h:5.0}})}else{s.addShape(p.shapes.RECTANGLE,{x:0,y:0,w:PW,h:5.0,fill:{color:C.lightGray}});s.addText("[ Replace with exterior photo ]",{x:0,y:2.0,w:PW,h:1,fontSize:14,color:C.gray,align:"center",italic:true,margin:0})}
  s.addText([{text:"BRIDGEWATER",options:{fontSize:14,bold:true,color:C.dark,charSpacing:2,breakLine:true}},{text:"REALTY ADVISORS",options:{fontSize:6,color:C.gray,charSpacing:3}}],{x:0.4,y:0.25,w:3,h:0.5,margin:0});
  s.addShape(p.shapes.RECTANGLE,{x:0,y:5.0,w:PW,h:2.5,fill:{color:C.darkBg}});
  const addrs=(d.addresses||[d.address||""]).map(a=>a.toUpperCase()).join("\n");
  s.addText(addrs+"\n"+(d.cityStateZip||"").toUpperCase(),{x:0.5,y:5.15,w:3.5,h:1.2,fontSize:14,fontFace:FONT_BOLD,bold:true,color:C.white,margin:0,lineSpacingMultiple:1.2});
  s.addText(d.unitDescription||"",{x:0.5,y:6.35,w:3.5,h:0.35,fontSize:13,fontFace:FONT_SERIF,italic:true,color:C.white,margin:0});
  const ag=d.agents||[];const n=ag.length;const sx=n===3?4.2:n===2?5.0:6.0;const sp=n===3?2.0:2.5;
  ag.forEach((a,i)=>{const cx=sx+i*sp,cy=4.2,cs=1.2;
    s.addShape(p.shapes.OVAL,{x:cx-0.05,y:cy-0.05,w:cs+0.1,h:cs+0.1,fill:{color:C.white}});
    if(a.photo){s.addImage({data:a.photo,x:cx,y:cy,w:cs,h:cs,rounding:true})}else{s.addShape(p.shapes.OVAL,{x:cx,y:cy,w:cs,h:cs,fill:{color:"CCCCCC"}});s.addText(a.name.split(" ").map(w=>w[0]).join("").slice(0,2),{x:cx,y:cy,w:cs,h:cs,fontSize:20,color:C.white,align:"center",valign:"middle",margin:0})}
    const ix=cx-0.3,iw=cs+0.6;
    s.addText(a.name.toUpperCase(),{x:ix,y:5.55,w:iw,h:0.25,fontSize:8,fontFace:FONT_BOLD,bold:true,color:C.white,align:"center",margin:0});
    s.addText(a.title||"",{x:ix,y:5.78,w:iw,h:0.2,fontSize:7,color:C.white,align:"center",margin:0});
    s.addText(a.phone||"",{x:ix,y:5.95,w:iw,h:0.2,fontSize:7,color:C.white,align:"center",margin:0});
    s.addText(a.email||"",{x:ix,y:6.1,w:iw,h:0.2,fontSize:7,color:C.white,align:"center",margin:0});
  });
}

function addOfferingSummarySlide(p,d){
  const s=p.addSlide();
  s.addShape(p.shapes.RECTANGLE,{x:0,y:0,w:4.8,h:PH,fill:{color:C.darkBg}});
  s.addShape(p.shapes.RECTANGLE,{x:0,y:0,w:2.2,h:0.65,fill:{color:C.red}});
  s.addText("OFFERING",{x:0.15,y:0.05,w:2.0,h:0.55,fontSize:26,fontFace:FONT_BOLD,bold:true,color:C.white,margin:0});
  s.addText(d.offeringText||"",{x:0.3,y:0.85,w:4.2,h:6.3,fontSize:10,color:C.white,align:"justify",margin:0,lineSpacingMultiple:1.35});
  s.addShape(p.shapes.RECTANGLE,{x:4.8,y:0,w:5.2,h:PH,fill:{color:C.white}});
  s.addText("SUMMARY",{x:5.2,y:0.15,w:4.2,h:0.6,fontSize:30,fontFace:FONT_BOLD,bold:true,color:C.black,align:"center",margin:0});
  if(d.summaryPairs){let y=0.95;d.summaryPairs.forEach((pr,i)=>{if(i===1)s.addShape(p.shapes.LINE,{x:5.2,y:y-0.02,w:4.3,h:0,line:{color:C.red,width:1}});if(pr.left)s.addText([{text:pr.left.label+": ",options:{fontSize:9,fontFace:FONT_BOLD,bold:true,color:C.black}},{text:pr.left.value,options:{fontSize:9,color:C.dark}}],{x:5.2,y,w:2.1,h:0.28,margin:0});if(pr.right)s.addText([{text:pr.right.label+": ",options:{fontSize:9,fontFace:FONT_BOLD,bold:true,color:C.black}},{text:pr.right.value,options:{fontSize:9,color:C.dark}}],{x:7.4,y,w:2.3,h:0.28,margin:0});y+=0.32});
    if(d.summaryNote)s.addText(d.summaryNote,{x:5.2,y:y+0.05,w:4.3,h:0.6,fontSize:8,bold:true,color:C.red,margin:0});
    const mapY=y+(d.summaryNote?0.7:0.2);
    if(d.mapPhoto){s.addImage({data:d.mapPhoto,x:5.2,y:mapY,w:4.3,h:PH-mapY-0.15,sizing:{type:"contain",w:4.3,h:PH-mapY-0.15}})}else{s.addShape(p.shapes.RECTANGLE,{x:5.2,y:mapY,w:4.3,h:PH-mapY-0.15,fill:{color:C.lightGray}});s.addText("[ Insert map screenshot ]",{x:5.2,y:mapY,w:4.3,h:PH-mapY-0.15,fontSize:11,color:C.gray,align:"center",valign:"middle",italic:true,margin:0})}
  }
}

function addPhotoGridSlide(p,d,photos,label){
  const s=p.addSlide();s.background={color:C.white};
  const g=0.06,hw=(PW-g)/2,hh=(PH-g)/2;
  [{x:0,y:0,w:hw,h:hh},{x:hw+g,y:0,w:hw,h:hh},{x:0,y:hh+g,w:hw,h:hh},{x:hw+g,y:hh+g,w:hw,h:hh}].forEach((pos,i)=>{
    if(photos&&photos[i]){s.addImage({data:photos[i],x:pos.x,y:pos.y,w:pos.w,h:pos.h,sizing:{type:"cover",w:pos.w,h:pos.h}})}else{s.addShape(p.shapes.RECTANGLE,{x:pos.x,y:pos.y,w:pos.w,h:pos.h,fill:{color:C.lightGray}});s.addText("[ Photo "+(i+1)+" ]",{x:pos.x,y:pos.y,w:pos.w,h:pos.h,fontSize:14,color:C.gray,align:"center",valign:"middle",italic:true,margin:0})}
  });
  if(label){s.addShape(p.shapes.RECTANGLE,{x:0,y:0,w:Math.max(2.5,label.length*0.18+0.5),h:0.65,fill:{color:C.red}});s.addText(label,{x:0.15,y:0.05,w:Math.max(2.3,label.length*0.18+0.3),h:0.55,fontSize:24,fontFace:FONT_BOLD,bold:true,color:C.white,margin:0})}
}

function addAerialSlide(p,d){
  const s=p.addSlide();s.background={color:C.white};
  if(d.aerialPhoto){s.addImage({data:d.aerialPhoto,x:0,y:0.6,w:PW,h:PH-0.6,sizing:{type:"cover",w:PW,h:PH-0.6}})}else{s.addShape(p.shapes.RECTANGLE,{x:0,y:0.6,w:PW,h:PH-0.6,fill:{color:C.lightGray}});s.addText("[ Insert aerial image ]",{x:0,y:3,w:PW,h:1,fontSize:16,color:C.gray,align:"center",italic:true,margin:0})}
  s.addShape(p.shapes.RECTANGLE,{x:0,y:0,w:2.8,h:0.65,fill:{color:C.red}});s.addText("AERIAL VIEW",{x:0.15,y:0.05,w:2.6,h:0.55,fontSize:26,fontFace:FONT_BOLD,bold:true,color:C.white,margin:0});
}

function addFloodMapSlide(p,d){
  const s=p.addSlide();s.background={color:C.white};
  if(d.floodMapPhoto){s.addImage({data:d.floodMapPhoto,x:0,y:0.6,w:PW,h:PH-0.6,sizing:{type:"cover",w:PW,h:PH-0.6}})}else{s.addShape(p.shapes.RECTANGLE,{x:0,y:0.6,w:PW,h:PH-0.6,fill:{color:C.lightGray}});s.addText("[ Insert flood map ]",{x:0,y:3,w:PW,h:1,fontSize:16,color:C.gray,align:"center",italic:true,margin:0})}
  s.addShape(p.shapes.RECTANGLE,{x:0,y:0,w:2.6,h:0.65,fill:{color:C.red}});s.addText("FLOOD MAP",{x:0.15,y:0.05,w:2.4,h:0.55,fontSize:26,fontFace:FONT_BOLD,bold:true,color:C.white,margin:0});
}

function addFinancialDividerSlide(p,d){
  const s=p.addSlide();
  if(d.financialDividerPhoto){s.background={data:d.financialDividerPhoto}}else{s.background={color:"3B3B3B"}}
  s.addShape(p.shapes.RECTANGLE,{x:0,y:0,w:PW,h:PH,fill:{color:"000000",transparency:45}});
  s.addText([{text:"BRIDGEWATER",options:{fontSize:14,bold:true,color:C.white,charSpacing:2,breakLine:true}},{text:"REALTY ADVISORS",options:{fontSize:6,color:C.white,charSpacing:3}}],{x:0.5,y:6.3,w:3,h:0.5,margin:0});
  s.addText("FINANCIAL OVERVIEW",{x:0.5,y:3.0,w:9,h:0.8,fontSize:40,fontFace:FONT_SERIF,italic:true,color:C.white,align:"center",valign:"middle",margin:0});
  const al=(d.addresses||[d.address||""]).join(" & ").toUpperCase();
  s.addText(al+"\n"+(d.cityStateZip||"").toUpperCase(),{x:1,y:3.9,w:8,h:0.7,fontSize:12,color:C.white,align:"center",charSpacing:2,margin:0,lineSpacingMultiple:1.4});
}

function addRentRollSlide(p,d){
  const s=p.addSlide();s.background={color:C.white};
  s.addText("RENT ROLL // "+(d.propertyLabel||d.propertyName||"").toUpperCase(),{x:0.3,y:0.15,w:9.4,h:0.4,fontSize:14,fontFace:FONT_BOLD,bold:true,color:C.dark,margin:0});
  const hdr={fill:{color:C.red},color:C.white,bold:true,fontSize:8,align:"center"};
  const rows=[[{text:"Unit #",options:hdr},{text:"Type",options:hdr},{text:"Size",options:hdr},{text:"Current Rent",options:hdr},{text:"Market Rent",options:hdr}]];
  (d.rentRoll||[]).forEach((u,i)=>{const bg=i%2===0?C.white:C.offWhite;rows.push([{text:u.unit||"",options:{fill:{color:bg},fontSize:7,align:"center"}},{text:u.type||"",options:{fill:{color:bg},fontSize:7,align:"center"}},{text:u.size?fmtNum(u.size):"",options:{fill:{color:bg},fontSize:7,align:"center"}},{text:u.currentRent!==undefined&&u.currentRent!==""?fmt$(u.currentRent):"",options:{fill:{color:bg},fontSize:7,align:"right"}},{text:u.marketRent!==undefined&&u.marketRent!==""?fmt$(u.marketRent):"",options:{fill:{color:bg},fontSize:7,align:"right"}}])});
  if(d.rentRollTotals){const t=d.rentRollTotals;const tb={fill:{color:C.darkBg},color:C.white,bold:true,fontSize:7};
    rows.push([{text:"PER MONTH",options:{...tb,align:"center"}},{text:"",options:tb},{text:t.totalSF?fmtNum(t.totalSF):"",options:{...tb,align:"center"}},{text:t.monthlyCurrentRent?fmt$(t.monthlyCurrentRent):"",options:{...tb,align:"right"}},{text:t.monthlyMarketRent?fmt$(t.monthlyMarketRent):"",options:{...tb,align:"right"}}]);
    rows.push([{text:"PER YEAR",options:{...tb,align:"center"}},{text:"",options:tb},{text:"",options:tb},{text:t.annualCurrentRent?fmt$(t.annualCurrentRent):"",options:{...tb,align:"right"}},{text:t.annualMarketRent?fmt$(t.annualMarketRent):"",options:{...tb,align:"right"}}])

// UTILITY: File to base64 data URL
// ════════════════════════════════════════════════════════
function fileToDataURL(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})}

// ════════════════════════════════════════════════════════
// PHOTO UPLOAD COMPONENT
// ════════════════════════════════════════════════════════
function PhotoUpload({value,onChange,label}){
  const handleFile=async(e)=>{const f=e.target.files?.[0];if(f){const d=await fileToDataURL(f);onChange(d)}};
  return <div className="photo-drop" style={{position:"relative"}}>
    {value?<><img src={value}/><button onClick={(e)=>{e.stopPropagation();onChange(null)}} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.7)",color:"#fff",border:"none",borderRadius:"50%",width:24,height:24,cursor:"pointer",fontSize:14}}>×</button></>:<span style={{color:"var(--muted)",fontSize:12}}>{label||"Click or drop image"}</span>}
    <input type="file" accept="image/*" onChange={handleFile}/>
  </div>
}

// LOGIN SCREEN
// ════════════════════════════════════════════════════════
function LoginScreen({onLogin}){
  const[email,setEmail]=useState("");const[pass,setPass]=useState("");const[err,setErr]=useState("");const[loading,setLoading]=useState(false);
  const handleLogin=async()=>{setErr("");setLoading(true);try{const r=await sbAuth(email,pass);localStorage.setItem("sb_token",r.access_token);localStorage.setItem("sb_user",JSON.stringify(r.user));onLogin(r.user)}catch(e){setErr(e.message)}finally{setLoading(false)}};
  return <div className="login-wrap"><div className="login-box">
    <h1>BRIDGEWATER</h1><p style={{letterSpacing:3,fontSize:10,color:"var(--muted)"}}>REALTY ADVISORS</p>
    <p>OM Generator — Sign In</p>
    <div className="field"><input placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)}/></div>
    <div className="field"><input type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/></div>
    {err&&<p style={{color:"var(--red)",fontSize:12,marginBottom:12}}>{err}</p>}
    <button className="btn-red" style={{width:"100%"}} onClick={handleLogin} disabled={loading}>{loading?<span className="spinner"/>:"Sign In"}</button>
  </div></div>
}

    setOpExpenses([{label:"Real Estate Taxes",current:"",proforma:"",notes:"",perUnit:"",perSF:""}]);
    setOpTotalExp({current:"",proforma:"",perUnit:"",perSF:""});setOpExpRatio({current:"",proforma:""});setOpNoi({current:"",proforma:""});setOpFootnotes("");
    setCfItems([{label:"Purchase Price",current:"",proforma:""},{label:"Down Payment",current:"",proforma:""},{label:"Loan Amount",current:"",proforma:""},{label:"Monthly Payments",current:"",proforma:""},{label:"Annual Debt Service",current:"",proforma:""},{label:"NOI",current:"",proforma:""},{label:"Income After ADS",current:"",proforma:""},{label:"DSCR",current:"",proforma:""},{label:"Cash on Cash Return",current:"",proforma:""},{label:"Monthly Cash Flow",current:"",proforma:""}]);
    setCfTerms([{label:"Rate (%)",current:"",proforma:""},{label:"Amortization",current:"",proforma:""},{label:"LTV",current:"",proforma:""}]);
    setStep(1);
    showToast("Form cleared — start fresh");
  }

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(""),3000)}

  // AI Generate offering text
  async function generateAIText(){
    setAiLoading(true);
    try{
      const prompt=`You are a commercial real estate copywriter for Bridgewater Realty Advisors. Write an investment-focused offering description for this property:\n\nProperty: ${propertyName}\nAddress: ${address}\nCity/State: ${cityState}\nUnit Description: ${unitDescription}\nSummary: ${summaryPairs.map(p=>(p.left?p.left.label+": "+p.left.value:"")+" "+(p.right?p.right.label+": "+p.right.value:"")).join(", ")}\n${aiPrompt?"Additional context: "+aiPrompt:""}\n\nWrite 3-4 concise paragraphs (investor-focused, professional tone). Do not use markdown. Focus on: investment highlights, property condition/features, and market/location benefits. Keep it under 300 words.`;
      const response=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:prompt}]})});
      const data=await response.json();
      const text=data.content?.[0]?.text||"";
      if(text)setOfferingText(text);
      else setOfferingText("AI generation requires the Anthropic API key. Please write your offering description manually.");
    }catch(e){setOfferingText("AI generation is only available when using this app within the Claude.ai environment or with a valid API key. Please write your offering description manually.")}
    setAiLoading(false);
  }

  // Build OM data object
  function buildOMData(){
    const agents=selectedAgents.map(id=>BW_AGENTS.find(a=>a.id===id)).filter(Boolean);
    return{
      propertyName,address,addresses:addresses.filter(a=>a.trim()),cityState,cityStateZip,unitDescription,propertyLabel:propertyLabel||propertyName,
      officeAddress:"3501 Severn Avenue, Suite 19",officeCity:"Metairie, LA, 70002",
      agents,includeAerial,includeFloodMap,
      coverPhoto,teamPhoto,aerialPhoto,floodMapPhoto,mapPhoto,financialDividerPhoto,
      photoSections,offeringText,summaryPairs,summaryNote,
      rentRoll,rentRollTotals:calcRentRollTotals(),rentRollFootnote,
      operatingStatement:{income:opIncome,expenses:opExpenses,totalExpenses:opTotalExp,expenseRatio:opExpRatio,noi:opNoi,footnotes:opFootnotes},
      cashFlow:{items:cfItems,financingTerms:cfTerms},
    }
  }

  function calcRentRollTotals(){
    let totalSF=0,mc=0,mm=0;
    rentRoll.forEach(u=>{totalSF+=Number(u.size)||0;mc+=Number(u.currentRent)||0;mm+=Number(u.marketRent)||0});
    return{totalSF,monthlyCurrentRent:mc,monthlyMarketRent:mm,annualCurrentRent:mc*12,annualMarketRent:mm*12}
  }

  // Generate PPTX
  async function handleGenerate(){
    setGenerating(true);
    try{
      const data=buildOMData();
      const pres=generateFullOM(data);
      const fileName=(propertyName||"Property").replace(/[^a-zA-Z0-9]/g,"_")+"_OM.pptx";
      await pres.writeFile({fileName});
      showToast("OM downloaded successfully!");
    }catch(e){console.error(e);showToast("Error generating OM")}
    setGenerating(false);
  }

  function handleLogout(){localStorage.removeItem("sb_token");localStorage.removeItem("sb_user");setUser(null)}

  if(!user)return <LoginScreen onLogin={setUser}/>;

  const steps=["Property Info","Deal Team","Photos","Offering Text","Summary","Financials","Generate"];

  return <>
    <div className="topbar">
      <h1>BRIDGEWATER <span className="red">OM GENERATOR</span></h1>
      <div style={{flex:1}}/>
      <button className="btn-dark btn-sm" onClick={handleStartFresh} style={{fontSize:11}}>✦ New OM</button>
      <span style={{fontSize:12,color:"var(--muted)"}}>{user.email}</span>
      <button className="btn-dark btn-sm" onClick={handleLogout}>Logout</button>
    </div>
    <div className="container">
      <div className="step-nav">
        {steps.map((s,i)=><div key={i} className={"step-btn"+(step===i+1?" active":step>i+1?" done":"")} onClick={()=>setStep(i+1)}>{i+1}. {s}</div>)}
      </div>

      {/* STEP 1: Property Info */}
      {step===1&&<div>
        <h2>Property Information</h2>
        <div className="card" style={{marginBottom:20,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:250}}>
            <label>Import from CRM</label>
            <select value={selectedListingId} onChange={e=>handleImportListing(e.target.value)} style={{background:"var(--surface2)"}}>
              <option value="">— Select a listing —</option>
              {loadingListings&&<option disabled>Loading listings...</option>}
              {crmListings.map(l=><option key={l.id} value={l.id}>{l.propertyName||l.name||l.address||"Untitled"} — {l.city||""}{l.state?", "+l.state:""}{l.units?" ("+l.units+" units)":""}</option>)}
            </select>
          </div>
          <div style={{display:"flex",gap:8,paddingTop:16}}>
            <button className="btn-dark btn-sm" onClick={fetchListings} disabled={loadingListings}>{loadingListings?"Refreshing...":"↻ Refresh"}</button>
            <button className="btn-dark btn-sm" onClick={handleStartFresh}>✦ Start Fresh</button>
          </div>
        </div>
        <div className="grid2">
          <div className="field"><label>Property Name</label><input value={propertyName} onChange={e=>setPropertyName(e.target.value)} placeholder="e.g. Lakeside Apartments"/></div>
          <div className="field"><label>Primary Address</label><input value={address} onChange={e=>setAddress(e.target.value)} placeholder="e.g. 436 Richmond Ave"/></div>
        </div>
        <div className="section">
          <label>All Addresses (one per line for multi-parcel)</label>
          {addresses.map((a,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:6}}>
            <input value={a} onChange={e=>{const n=[...addresses];n[i]=e.target.value;setAddresses(n)}} placeholder={"Address "+(i+1)}/>
            {addresses.length>1&&<button className="remove-btn" onClick={()=>setAddresses(addresses.filter((_,j)=>j!==i))}>×</button>}
          </div>)}
          <button className="add-row-btn" onClick={()=>setAddresses([...addresses,""])}>+ Add Address</button>
        </div>
        <div className="grid3">
          <div className="field"><label>City, State</label><input value={cityState} onChange={e=>setCityState(e.target.value)} placeholder="e.g. Houma, LA"/></div>
          <div className="field"><label>City, State, Zip</label><input value={cityStateZip} onChange={e=>setCityStateZip(e.target.value)} placeholder="e.g. HOUMA, LA 70363"/></div>
          <div className="field"><label>Unit Description</label><input value={unitDescription} onChange={e=>setUnitDescription(e.target.value)} placeholder="e.g. 16-Unit Multifamily Property"/></div>
        </div>
        <div className="field"><label>Property Label (for financial table headers)</label><input value={propertyLabel} onChange={e=>setPropertyLabel(e.target.value)} placeholder="e.g. Richmond+Arlington Apartments"/></div>
        <div className="grid2" style={{marginTop:16}}>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}><input type="checkbox" checked={includeAerial} onChange={e=>setIncludeAerial(e.target.checked)}/> Include Aerial View slide</label>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}><input type="checkbox" checked={includeFloodMap} onChange={e=>setIncludeFloodMap(e.target.checked)}/> Include Flood Map slide</label>
        </div>
        <div style={{marginTop:20,textAlign:"right"}}><button className="btn-red" onClick={()=>setStep(2)}>Next: Deal Team →</button></div>
      </div>}

      {/* STEP 2: Deal Team */}
      {step===2&&<div>
        <h2>Deal Team</h2>
        <p style={{fontSize:13,color:"var(--muted)",marginBottom:16}}>Select the agents to appear on this OM.</p>
        <div className="grid2">
          {BW_AGENTS.map(a=><label key={a.id} className="card" style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
            <input type="checkbox" checked={selectedAgents.includes(a.id)} onChange={e=>{if(e.target.checked)setSelectedAgents([...selectedAgents,a.id]);else setSelectedAgents(selectedAgents.filter(x=>x!==a.id))}}/>
            <div><div style={{fontWeight:600,fontSize:13}}>{a.name}</div><div style={{fontSize:11,color:"var(--muted)"}}>{a.title} • {a.email}</div></div>
          </label>)}
        </div>
        <div style={{marginTop:20,display:"flex",justifyContent:"space-between"}}><button className="btn-dark" onClick={()=>setStep(1)}>← Back</button><button className="btn-red" onClick={()=>setStep(3)}>Next: Photos →</button></div>
      </div>}

      {/* STEP 3: Photos */}
      {step===3&&<div>
        <h2>Photos & Images</h2>
        <div className="grid2" style={{marginBottom:20}}>
          <div className="section"><h3>Cover Photo</h3><PhotoUpload value={coverPhoto} onChange={setCoverPhoto} label="Aerial/cover photo"/></div>
          <div className="section"><h3>Team Slide Photo</h3><PhotoUpload value={teamPhoto} onChange={setTeamPhoto} label="Exterior property photo"/></div>
        </div>
        <div className="grid3" style={{marginBottom:20}}>
          <div className="section"><h3>Map Screenshot</h3><PhotoUpload value={mapPhoto} onChange={setMapPhoto} label="Google Maps screenshot"/></div>
          {includeAerial&&<div className="section"><h3>Aerial View</h3><PhotoUpload value={aerialPhoto} onChange={setAerialPhoto} label="Satellite/aerial image"/></div>}
          {includeFloodMap&&<div className="section"><h3>Flood Map</h3><PhotoUpload value={floodMapPhoto} onChange={setFloodMapPhoto} label="FEMA flood map"/></div>}
          <div className="section"><h3>Financial Divider Photo</h3><PhotoUpload value={financialDividerPhoto} onChange={setFinancialDividerPhoto} label="Property photo for divider"/></div>
        </div>

        <h3>Photo Grid Sections</h3>
        <p style={{fontSize:12,color:"var(--muted)",marginBottom:12}}>Each section creates a 2×2 photo grid slide. Add sections as needed (e.g. Exterior, Interior, Building A, etc.)</p>
        {photoSections.map((sec,si)=><div key={si} className="card" style={{marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <input value={sec.label} onChange={e=>{const n=[...photoSections];n[si]={...n[si],label:e.target.value};setPhotoSections(n)}} placeholder="Section label (e.g. Exterior)" style={{width:200}}/>
            <span className="tag tag-opt">Red banner label</span>
            <div style={{flex:1}}/>
            <button className="remove-btn" onClick={()=>setPhotoSections(photoSections.filter((_,j)=>j!==si))}>Remove</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
            {sec.photos.map((ph,pi)=><PhotoUpload key={pi} value={ph} onChange={v=>{const n=[...photoSections];const p=[...n[si].photos];p[pi]=v;n[si]={...n[si],photos:p};setPhotoSections(n)}} label={"Photo "+(pi+1)}/>)}
          </div>
        </div>)}
        <button className="add-row-btn" onClick={()=>setPhotoSections([...photoSections,{label:"",photos:[null,null,null,null]}])}>+ Add Photo Section</button>

        <div style={{marginTop:20,display:"flex",justifyContent:"space-between"}}><button className="btn-dark" onClick={()=>setStep(2)}>← Back</button><button className="btn-red" onClick={()=>setStep(4)}>Next: Offering Text →</button></div>
      </div>}

      {/* STEP 4: Offering Text */}
      {step===4&&<div>
        <h2>Offering Description</h2>
        <div className="section">
          <div className="ai-bar">
            <input value={aiPrompt} onChange={e=>setAiPrompt(e.target.value)} placeholder="Optional: additional context for AI (e.g. 'value-add opportunity, recently renovated')" style={{flex:1}}/>
            <button className="btn-red btn-sm" onClick={generateAIText} disabled={aiLoading} style={{whiteSpace:"nowrap"}}>{aiLoading?<><span className="spinner" style={{marginRight:6}}/>Generating...</>:"✦ AI Generate"}</button>
          </div>
          <textarea value={offeringText} onChange={e=>setOfferingText(e.target.value)} rows={14} placeholder="Write or AI-generate your offering description here. This appears on the left side of the Offering + Summary slide."/>
        </div>
        <div style={{marginTop:20,display:"flex",justifyContent:"space-between"}}><button className="btn-dark" onClick={()=>setStep(3)}>← Back</button><button className="btn-red" onClick={()=>setStep(5)}>Next: Summary →</button></div>
      </div>}

      {/* STEP 5: Summary Metrics */}
      {step===5&&<div>
        <h2>Summary Metrics</h2>
        <p style={{fontSize:12,color:"var(--muted)",marginBottom:16}}>These appear on the right side of the Offering + Summary slide.</p>
        {summaryPairs.map((pair,i)=><div key={i} className="grid2" style={{marginBottom:8}}>
          <div style={{display:"flex",gap:6}}><input value={pair.left.label} onChange={e=>{const n=[...summaryPairs];n[i]={...n[i],left:{...n[i].left,label:e.target.value}};setSummaryPairs(n)}} style={{width:"40%"}} placeholder="Label"/><input value={pair.left.value} onChange={e=>{const n=[...summaryPairs];n[i]={...n[i],left:{...n[i].left,value:e.target.value}};setSummaryPairs(n)}} placeholder="Value"/></div>
          <div style={{display:"flex",gap:6}}><input value={pair.right.label} onChange={e=>{const n=[...summaryPairs];n[i]={...n[i],right:{...n[i].right,label:e.target.value}};setSummaryPairs(n)}} style={{width:"40%"}} placeholder="Label"/><input value={pair.right.value} onChange={e=>{const n=[...summaryPairs];n[i]={...n[i],right:{...n[i].right,value:e.target.value}};setSummaryPairs(n)}} placeholder="Value"/></div>
        </div>)}
        <button className="add-row-btn" onClick={()=>setSummaryPairs([...summaryPairs,{left:{label:"",value:""},right:{label:"",value:""}}])}>+ Add Metric Row</button>
        <div className="field" style={{marginTop:12}}><label>Summary Note (red text, optional)</label><input value={summaryNote} onChange={e=>setSummaryNote(e.target.value)} placeholder="e.g. *ALL REPAIRS MADE NOW EXCEPT FOR 3 UNITS*"/></div>
        <div style={{marginTop:20,display:"flex",justifyContent:"space-between"}}><button className="btn-dark" onClick={()=>setStep(4)}>← Back</button><button className="btn-red" onClick={()=>setStep(6)}>Next: Financials →</button></div>
      </div>}

      {/* STEP 6: Financials */}
      {step===6&&<div>
        <h2>Financial Data</h2>

        {/* Rent Roll */}
        <div className="section">
          <h3>Rent Roll</h3>
          <table className="fin-table"><thead><tr><th>Unit #</th><th>Type</th><th>Size (SF)</th><th>Current Rent</th><th>Market Rent</th><th></th></tr></thead><tbody>
            {rentRoll.map((u,i)=><tr key={i}>
              <td><input value={u.unit} onChange={e=>{const n=[...rentRoll];n[i]={...n[i],unit:e.target.value};setRentRoll(n)}} style={{width:60}}/></td>
              <td><input value={u.type} onChange={e=>{const n=[...rentRoll];n[i]={...n[i],type:e.target.value};setRentRoll(n)}}/></td>
              <td><input type="number" value={u.size} onChange={e=>{const n=[...rentRoll];n[i]={...n[i],size:e.target.value};setRentRoll(n)}} style={{width:70}}/></td>
              <td><input type="number" value={u.currentRent} onChange={e=>{const n=[...rentRoll];n[i]={...n[i],currentRent:e.target.value};setRentRoll(n)}} style={{width:90}}/></td>
              <td><input type="number" value={u.marketRent} onChange={e=>{const n=[...rentRoll];n[i]={...n[i],marketRent:e.target.value};setRentRoll(n)}} style={{width:90}}/></td>
              <td><button className="remove-btn" onClick={()=>setRentRoll(rentRoll.filter((_,j)=>j!==i))}>×</button></td>
            </tr>)}
          </tbody></table>
          <button className="add-row-btn" onClick={()=>setRentRoll([...rentRoll,{unit:String(rentRoll.length+1),type:"2 BED / 1 BATH",size:"",currentRent:"",marketRent:""}])}>+ Add Unit</button>
          <div className="field" style={{marginTop:8}}><label>Rent Roll Footnote</label><input value={rentRollFootnote} onChange={e=>setRentRollFootnote(e.target.value)} placeholder="e.g. **Units 5, 6, & 8 are currently vacant**"/></div>
        </div>

        {/* Operating Statement */}
        <div className="section">
          <h3>Operating Statement — Income</h3>
          <table className="fin-table"><thead><tr><th>Label</th><th>Current</th><th>Pro-Forma</th><th>Notes</th><th>Per Unit</th><th>Per SF</th><th></th></tr></thead><tbody>
            {opIncome.map((item,i)=><tr key={i}>
              <td><input value={item.label} onChange={e=>{const n=[...opIncome];n[i]={...n[i],label:e.target.value};setOpIncome(n)}}/></td>
              <td><input value={item.current} onChange={e=>{const n=[...opIncome];n[i]={...n[i],current:e.target.value};setOpIncome(n)}} style={{width:90}}/></td>
              <td><input value={item.proforma} onChange={e=>{const n=[...opIncome];n[i]={...n[i],proforma:e.target.value};setOpIncome(n)}} style={{width:90}}/></td>
              <td><input value={item.notes} onChange={e=>{const n=[...opIncome];n[i]={...n[i],notes:e.target.value};setOpIncome(n)}} style={{width:50}}/></td>
              <td><input value={item.perUnit} onChange={e=>{const n=[...opIncome];n[i]={...n[i],perUnit:e.target.value};setOpIncome(n)}} style={{width:70}}/></td>
              <td><input value={item.perSF} onChange={e=>{const n=[...opIncome];n[i]={...n[i],perSF:e.target.value};setOpIncome(n)}} style={{width:60}}/></td>
              <td><button className="remove-btn" onClick={()=>setOpIncome(opIncome.filter((_,j)=>j!==i))}>×</button></td>
            </tr>)}
          </tbody></table>
          <button className="add-row-btn" onClick={()=>setOpIncome([...opIncome,{label:"",current:"",proforma:"",notes:"",perUnit:"",perSF:""}])}>+ Add Income Row</button>
        </div>

        <div className="section">
          <h3>Operating Statement — Expenses</h3>
          <table className="fin-table"><thead><tr><th>Label</th><th>Current</th><th>Pro-Forma</th><th>Notes</th><th>Per Unit</th><th>Per SF</th><th></th></tr></thead><tbody>
            {opExpenses.map((item,i)=><tr key={i}>
              <td><input value={item.label} onChange={e=>{const n=[...opExpenses];n[i]={...n[i],label:e.target.value};setOpExpenses(n)}}/></td>
              <td><input value={item.current} onChange={e=>{const n=[...opExpenses];n[i]={...n[i],current:e.target.value};setOpExpenses(n)}} style={{width:90}}/></td>
              <td><input value={item.proforma} onChange={e=>{const n=[...opExpenses];n[i]={...n[i],proforma:e.target.value};setOpExpenses(n)}} style={{width:90}}/></td>
              <td><input value={item.notes} onChange={e=>{const n=[...opExpenses];n[i]={...n[i],notes:e.target.value};setOpExpenses(n)}} style={{width:50}}/></td>
              <td><input value={item.perUnit} onChange={e=>{const n=[...opExpenses];n[i]={...n[i],perUnit:e.target.value};setOpExpenses(n)}} style={{width:70}}/></td>
              <td><input value={item.perSF} onChange={e=>{const n=[...opExpenses];n[i]={...n[i],perSF:e.target.value};setOpExpenses(n)}} style={{width:60}}/></td>
              <td><button className="remove-btn" onClick={()=>setOpExpenses(opExpenses.filter((_,j)=>j!==i))}>×</button></td>
            </tr>)}
          </tbody></table>
          <button className="add-row-btn" onClick={()=>setOpExpenses([...opExpenses,{label:"",current:"",proforma:"",notes:"",perUnit:"",perSF:""}])}>+ Add Expense Row</button>
        </div>

        <div className="grid3">
          <div className="field"><label>Total Expenses — Current</label><input value={opTotalExp.current} onChange={e=>setOpTotalExp({...opTotalExp,current:e.target.value})}/></div>
          <div className="field"><label>Total Expenses — Pro-Forma</label><input value={opTotalExp.proforma} onChange={e=>setOpTotalExp({...opTotalExp,proforma:e.target.value})}/></div>
          <div className="field"><label>Total Expenses — Per Unit</label><input value={opTotalExp.perUnit} onChange={e=>setOpTotalExp({...opTotalExp,perUnit:e.target.value})}/></div>
        </div>
        <div className="grid3">
          <div className="field"><label>Expense Ratio — Current</label><input value={opExpRatio.current} onChange={e=>setOpExpRatio({...opExpRatio,current:e.target.value})}/></div>
          <div className="field"><label>Expense Ratio — Pro-Forma</label><input value={opExpRatio.proforma} onChange={e=>setOpExpRatio({...opExpRatio,proforma:e.target.value})}/></div>
          <div className="field"><label>Total Expenses — Per SF</label><input value={opTotalExp.perSF} onChange={e=>setOpTotalExp({...opTotalExp,perSF:e.target.value})}/></div>
        </div>
        <div className="grid2">
          <div className="field"><label>NOI — Current</label><input value={opNoi.current} onChange={e=>setOpNoi({...opNoi,current:e.target.value})}/></div>
          <div className="field"><label>NOI — Pro-Forma</label><input value={opNoi.proforma} onChange={e=>setOpNoi({...opNoi,proforma:e.target.value})}/></div>
        </div>
        <div className="field"><label>Operating Statement Footnotes</label><textarea value={opFootnotes} onChange={e=>setOpFootnotes(e.target.value)} rows={4} placeholder="[1] Market vacancy is 5%..."/></div>

        {/* Cash Flow */}
        <div className="section" style={{marginTop:20}}>
          <h3>Cash Flow Analysis</h3>
          <table className="fin-table"><thead><tr><th>Label</th><th>Current</th><th>Pro Forma</th><th></th></tr></thead><tbody>
            {cfItems.map((item,i)=><tr key={i}>
              <td><input value={item.label} onChange={e=>{const n=[...cfItems];n[i]={...n[i],label:e.target.value};setCfItems(n)}}/></td>
              <td><input value={item.current} onChange={e=>{const n=[...cfItems];n[i]={...n[i],current:e.target.value};setCfItems(n)}}/></td>
              <td><input value={item.proforma} onChange={e=>{const n=[...cfItems];n[i]={...n[i],proforma:e.target.value};setCfItems(n)}}/></td>
              <td><button className="remove-btn" onClick={()=>setCfItems(cfItems.filter((_,j)=>j!==i))}>×</button></td>
            </tr>)}
          </tbody></table>
          <button className="add-row-btn" onClick={()=>setCfItems([...cfItems,{label:"",current:"",proforma:""}])}>+ Add Row</button>
        </div>
        <div className="section">
          <h3>Financing Terms</h3>
          <table className="fin-table"><thead><tr><th>Label</th><th>Current</th><th>Pro Forma</th></tr></thead><tbody>
            {cfTerms.map((t,i)=><tr key={i}>
              <td><input value={t.label} onChange={e=>{const n=[...cfTerms];n[i]={...n[i],label:e.target.value};setCfTerms(n)}}/></td>
              <td><input value={t.current} onChange={e=>{const n=[...cfTerms];n[i]={...n[i],current:e.target.value};setCfTerms(n)}}/></td>
              <td><input value={t.proforma} onChange={e=>{const n=[...cfTerms];n[i]={...n[i],proforma:e.target.value};setCfTerms(n)}}/></td>
            </tr>)}
          </tbody></table>
        </div>

        <div style={{marginTop:20,display:"flex",justifyContent:"space-between"}}><button className="btn-dark" onClick={()=>setStep(5)}>← Back</button><button className="btn-red" onClick={()=>setStep(7)}>Next: Generate →</button></div>
      </div>}

      {/* STEP 7: Generate */}
      {step===7&&<div>
        <h2>Generate Offering Memorandum</h2>
        <div className="card" style={{textAlign:"center",padding:40}}>
          <h3 style={{fontSize:18,marginBottom:8}}>{propertyName||"Untitled Property"}</h3>
          <p style={{color:"var(--muted)",fontSize:13,marginBottom:4}}>{address} • {cityState}</p>
          <p style={{color:"var(--muted)",fontSize:13,marginBottom:20}}>{unitDescription} • {selectedAgents.length} agent{selectedAgents.length!==1?"s":""} • {photoSections.length} photo section{photoSections.length!==1?"s":""}</p>
          <p style={{color:"var(--muted)",fontSize:12,marginBottom:24}}>Slides: Cover, Team, {includeAerial?"Aerial, ":""}Offering+Summary, {includeFloodMap?"Flood Map, ":""}{photoSections.map(s=>s.label||"Photos").join(", ")}, Financial Divider, {rentRoll.length?"Rent Roll, ":""}Op Statement, Cash Flow, Contact</p>
          <button className="btn-green" style={{fontSize:16,padding:"14px 40px"}} onClick={handleGenerate} disabled={generating}>
            {generating?<><span className="spinner" style={{marginRight:8}}/>Generating PPTX...</>:"⬇ Download OM (.pptx)"}
          </button>
          <p style={{color:"var(--sub)",fontSize:11,marginTop:12}}>The PPTX is fully editable in PowerPoint, Google Slides, or Keynote</p>
        </div>
        <div style={{marginTop:20}}><button className="btn-dark" onClick={()=>setStep(6)}>← Back to Financials</button></div>
      </div>}
    </div>
    {toast&&<div className="toast">{toast}</div>}
  </>
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
