<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>BWRA Offering Memorandum Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">

// ═══════════════════════════════════════════════════════════════════════════
// BWRA OM GENERATOR — Standalone App
// ═══════════════════════════════════════════════════════════════════════════

const { useState, useEffect, useRef, useCallback } = React;

// Supabase config (same as CRM)
const SB_URL = "https://khctptruikafdcxqsvvy.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtoY3RwdHJ1aWthZmRjeHFzdnZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjgzNjAsImV4cCI6MjA4ODYwNDM2MH0.McOv-IDQjDYArugi_QhYJoW9fCItMYF6h6AsDcG1h5g";
";

const TEAM = [
  { name: "Bryce Marullo", title: "Partner", phone: "(504) 301-5583", email: "bryce@bridgewater.realty" },
  { name: "Mason McCullough", title: "Partner", phone: "", email: "mason@bridgewater.realty" },
  { name: "Cameron Griffin", title: "Agent", phone: "", email: "cameron@bridgewater.realty" },
];

// Brand palette
const B = {
  bg: "#0a0a0a", surface: "#111111", surface2: "#1a1a1a", surface3: "#222222",
  red: "#dc2626", redDark: "#991b1b", redGlow: "rgba(220,38,38,.12)",
  text: "#f1f1f1", muted: "#888888", sub: "#666666", border: "#2a2a2a",
  green: "#22c55e", amber: "#f59e0b", blue: "#3b82f6",
};

// pptxgenjs brand colors (no # prefix!)
const P = {
  bg: "0A0A0A", surface: "111111", surface2: "1A1A1A", surface3: "222222",
  red: "DC2626", redDark: "991B1B", white: "FFFFFF",
  text: "F1F1F1", muted: "888888", sub: "666666", border: "2A2A2A",
  green: "22C55E", amber: "F59E0B", blue: "3B82F6",
};

function fmt$(n) {
  if (n === null || n === undefined || n === "") return "$0";
  n = parseFloat(n) || 0;
  if (n >= 1000000) return "$" + (n / 1000000).toFixed(2) + "M";
  if (n >= 1000) return "$" + Math.round(n).toLocaleString();
  return "$" + n.toLocaleString();
}

function fmtFull$(n) {
  if (!n) return "$0";
  return "$" + Math.round(parseFloat(n) || 0).toLocaleString();
}

// ═══════════════════════════════════════════════════════════════════════════
// PPTX GENERATOR — The actual slide builder
// ═══════════════════════════════════════════════════════════════════════════

function generateOMPPTX(data) {
  const pres = new PptxGenJS();
  pres.layout = "LAYOUT_16x9";
  pres.author = "Bridgewater Realty Advisors";
  pres.title = (data.propertyName || "Property") + " - Offering Memorandum";

  const W = 10, H = 5.625;
  const M = 0.6; // margin
  const CW = W - M * 2; // content width

  // Fresh shadow factory (pptxgenjs mutates objects!)
  const shadow = () => ({ type: "outer", blur: 6, offset: 2, angle: 135, color: "000000", opacity: 0.2 });
  const softShadow = () => ({ type: "outer", blur: 4, offset: 1, angle: 135, color: "000000", opacity: 0.12 });

  // Reusable slide chrome
  function addChrome(slide) {
    slide.background = { color: P.bg };
    slide.addShape(pres.shapes.RECTANGLE, { x: 0, y: 0, w: W, h: 0.05, fill: { color: P.red } });
    slide.addShape(pres.shapes.RECTANGLE, { x: 0, y: H - 0.05, w: W, h: 0.05, fill: { color: P.red } });
    // Footer
    slide.addText("BRIDGEWATER REALTY ADVISORS  |  CONFIDENTIAL", {
      x: M, y: H - 0.35, w: CW, h: 0.25,
      fontSize: 6, fontFace: "Arial", color: P.border,
      charSpacing: 3, align: "center", margin: 0,
    });
  }

  function addTitle(slide, text) {
    slide.addText(text, {
      x: M, y: 0.3, w: CW, h: 0.5,
      fontSize: 24, fontFace: "Arial Black", color: P.white, margin: 0,
    });
    slide.addShape(pres.shapes.RECTANGLE, {
      x: M, y: 0.82, w: 1.2, h: 0.04, fill: { color: P.red },
    });
  }

  // ─────────────────────────────────────────────────────────────
  // SLIDE 1: COVER
  // ─────────────────────────────────────────────────────────────
  const s1 = pres.addSlide();
  addChrome(s1);

  // Brand name
  s1.addText("BRIDGEWATER", {
    x: M, y: 0.55, w: CW, h: 0.5,
    fontSize: 16, fontFace: "Arial Black", color: P.red,
    charSpacing: 10, align: "center", margin: 0,
  });
  s1.addText("REALTY ADVISORS", {
    x: M, y: 0.95, w: CW, h: 0.3,
    fontSize: 9, fontFace: "Arial", color: P.muted,
    charSpacing: 8, align: "center", margin: 0,
  });

  // Red divider
  s1.addShape(pres.shapes.RECTANGLE, {
    x: W / 2 - 0.6, y: 1.45, w: 1.2, h: 0.04, fill: { color: P.red },
  });

  // Property name
  s1.addText((data.propertyName || "").toUpperCase(), {
    x: M, y: 1.7, w: CW, h: 0.8,
    fontSize: 36, fontFace: "Arial Black", color: P.white,
    align: "center", margin: 0, shrinkText: true,
  });

  // Address
  s1.addText(data.address + (data.city ? ", " + data.city : ""), {
    x: M, y: 2.5, w: CW, h: 0.3,
    fontSize: 13, fontFace: "Arial", color: P.muted,
    align: "center", margin: 0,
  });

  // Key stats row
  var coverStats = [
    { label: "ASKING PRICE", value: fmt$(data.askingPrice) },
    { label: "UNITS", value: String(data.units || "-") },
    { label: "CAP RATE", value: data.capRate ? data.capRate + "%" : "-" },
    { label: "PRICE / UNIT", value: fmt$(data.pricePerUnit || (data.units > 0 ? Math.round((data.askingPrice || 0) / data.units) : 0)) },
  ];
  var statW = 2.0, statGap = 0.25;
  var totalW = coverStats.length * statW + (coverStats.length - 1) * statGap;
  var startX = (W - totalW) / 2;

  coverStats.forEach(function(st, i) {
    var sx = startX + i * (statW + statGap);
    s1.addShape(pres.shapes.RECTANGLE, {
      x: sx, y: 3.15, w: statW, h: 1.1,
      fill: { color: P.surface2 }, shadow: softShadow(),
    });
    s1.addText(st.label, {
      x: sx, y: 3.25, w: statW, h: 0.25,
      fontSize: 7, fontFace: "Arial", color: P.muted,
      align: "center", charSpacing: 3, margin: 0,
    });
    s1.addText(st.value, {
      x: sx, y: 3.5, w: statW, h: 0.55,
      fontSize: 24, fontFace: "Arial Black", color: P.white,
      align: "center", margin: 0,
    });
  });

  // Confidential footer
  s1.addText("CONFIDENTIAL OFFERING MEMORANDUM", {
    x: M, y: 4.55, w: CW, h: 0.3,
    fontSize: 7, fontFace: "Arial", color: P.border,
    charSpacing: 5, align: "center", margin: 0,
  });

  // ─────────────────────────────────────────────────────────────
  // SLIDE 2: OFFERING SUMMARY
  // ─────────────────────────────────────────────────────────────
  const s2 = pres.addSlide();
  addChrome(s2);
  addTitle(s2, "OFFERING SUMMARY");

  var details = [
    ["Property Name", data.propertyName],
    ["Address", data.address + (data.city ? ", " + data.city : "")],
    ["Property Type", data.propertyType || "Multifamily"],
    ["Number of Units", String(data.units || "-")],
    ["Year Built", String(data.yearBuilt || "-")],
    ["Lot Size", data.lotSize || "-"],
    ["Asking Price", fmtFull$(data.askingPrice)],
    ["Price Per Unit", fmtFull$(data.pricePerUnit || (data.units > 0 ? Math.round((data.askingPrice || 0) / data.units) : 0))],
    ["Cap Rate", data.capRate ? data.capRate + "%" : "-"],
    ["Current Occupancy", data.occupancy ? data.occupancy + "%" : "-"],
  ];

  var colW2 = CW / 2;
  details.forEach(function(row, i) {
    var col = i % 2;
    var rowIdx = Math.floor(i / 2);
    var rx = M + col * colW2;
    var ry = 1.1 + rowIdx * 0.52;
    var bgC = rowIdx % 2 === 0 ? P.surface : P.bg;

    s2.addShape(pres.shapes.RECTANGLE, {
      x: rx, y: ry, w: colW2 - 0.08, h: 0.46,
      fill: { color: bgC },
    });
    s2.addText(row[0], {
      x: rx + 0.12, y: ry, w: 1.8, h: 0.46,
      fontSize: 9, fontFace: "Arial", color: P.muted, valign: "middle", margin: 0,
    });
    s2.addText(row[1] || "-", {
      x: rx + 1.9, y: ry, w: colW2 - 2.1, h: 0.46,
      fontSize: 10, fontFace: "Arial", color: P.white, bold: true,
      valign: "middle", align: "right", margin: 0,
    });
  });

  // Description
  if (data.description) {
    s2.addText(data.description, {
      x: M, y: 3.85, w: CW, h: 1.3,
      fontSize: 9, fontFace: "Arial", color: P.muted,
      lineSpacingMultiple: 1.6, margin: 0, valign: "top",
    });
  }

  // ─────────────────────────────────────────────────────────────
  // SLIDE 3: FINANCIAL OVERVIEW
  // ─────────────────────────────────────────────────────────────
  const s3 = pres.addSlide();
  addChrome(s3);
  addTitle(s3, "FINANCIAL OVERVIEW");

  var finCards = [
    { label: "NET OPERATING INCOME", value: fmtFull$(data.noi), color: P.green },
    { label: "GROSS REVENUE", value: fmtFull$(data.grossRevenue), color: P.blue },
    { label: "OPERATING EXPENSES", value: fmtFull$(data.expenses), color: P.amber },
    { label: "EXPENSE RATIO", value: data.expenseRatio ? data.expenseRatio + "%" : "-", color: P.red },
  ];

  var cardW3 = (CW - 0.3) / 2;
  var cardH3 = 1.25;
  finCards.forEach(function(fc, i) {
    var col = i % 2;
    var row = Math.floor(i / 2);
    var cx = M + col * (cardW3 + 0.3);
    var cy = 1.1 + row * (cardH3 + 0.2);

    s3.addShape(pres.shapes.RECTANGLE, {
      x: cx, y: cy, w: cardW3, h: cardH3,
      fill: { color: P.surface }, shadow: softShadow(),
    });
    s3.addShape(pres.shapes.RECTANGLE, {
      x: cx, y: cy, w: 0.06, h: cardH3,
      fill: { color: fc.color },
    });
    s3.addText(fc.label, {
      x: cx + 0.22, y: cy + 0.2, w: cardW3 - 0.4, h: 0.25,
      fontSize: 8, fontFace: "Arial", color: P.muted, charSpacing: 2, margin: 0,
    });
    s3.addText(fc.value, {
      x: cx + 0.22, y: cy + 0.5, w: cardW3 - 0.4, h: 0.55,
      fontSize: 28, fontFace: "Arial Black", color: P.white, margin: 0,
    });
  });

  // Rent summary bar
  if (data.avgRent || data.monthlyIncome) {
    var rentRow = [
      data.avgRent ? ["AVG RENT/UNIT", fmtFull$(data.avgRent) + "/mo"] : null,
      data.monthlyIncome ? ["MONTHLY INCOME", fmtFull$(data.monthlyIncome)] : null,
      data.annualIncome ? ["ANNUAL INCOME", fmtFull$(data.annualIncome)] : null,
    ].filter(Boolean);

    s3.addShape(pres.shapes.RECTANGLE, {
      x: M, y: 3.95, w: CW, h: 0.75,
      fill: { color: P.surface },
    });
    var riW = CW / rentRow.length;
    rentRow.forEach(function(ri, i) {
      s3.addText(ri[0], {
        x: M + i * riW, y: 4.0, w: riW, h: 0.25,
        fontSize: 7, fontFace: "Arial", color: P.muted, align: "center", charSpacing: 2, margin: 0,
      });
      s3.addText(ri[1], {
        x: M + i * riW, y: 4.25, w: riW, h: 0.4,
        fontSize: 16, fontFace: "Arial Black", color: P.white, align: "center", margin: 0,
      });
    });
  }

  // ─────────────────────────────────────────────────────────────
  // SLIDE 4: RENT ROLL / UNIT MIX
  // ─────────────────────────────────────────────────────────────
  if (data.unitMix && data.unitMix.length > 0) {
    const s4 = pres.addSlide();
    addChrome(s4);
    addTitle(s4, "UNIT MIX & RENT ROLL");

    var headers = ["Unit Type", "# Units", "Sq Ft", "Monthly Rent", "Annual Total"];
    var colWidths4 = [2.4, 1.2, 1.4, 1.8, 2.0];

    var headerRow = headers.map(function(h, i) {
      return {
        text: h, options: {
          fill: { color: P.red }, color: P.white, bold: true,
          fontSize: 9, fontFace: "Arial", align: i > 0 ? "center" : "left",
          margin: [5, 8, 5, 8],
        }
      };
    });

    var tableRows = [headerRow];
    var totalUnits = 0, totalMonthly = 0;

    data.unitMix.forEach(function(unit, idx) {
      var rowBg = idx % 2 === 0 ? P.surface : P.bg;
      var count = parseInt(unit.count) || 0;
      var rent = parseFloat(unit.rent) || 0;
      var annual = count * rent * 12;
      totalUnits += count;
      totalMonthly += count * rent;

      tableRows.push([
        { text: unit.type || "-", options: { fill: { color: rowBg }, color: P.white, fontSize: 10, fontFace: "Arial", margin: [5, 8, 5, 8] } },
        { text: String(count), options: { fill: { color: rowBg }, color: P.white, fontSize: 10, fontFace: "Arial", align: "center", margin: [5, 8, 5, 8] } },
        { text: unit.sqft ? unit.sqft + " sf" : "-", options: { fill: { color: rowBg }, color: P.muted, fontSize: 10, fontFace: "Arial", align: "center", margin: [5, 8, 5, 8] } },
        { text: rent > 0 ? fmtFull$(rent) : "-", options: { fill: { color: rowBg }, color: P.white, fontSize: 10, fontFace: "Arial", align: "center", bold: true, margin: [5, 8, 5, 8] } },
        { text: annual > 0 ? fmtFull$(annual) : "-", options: { fill: { color: rowBg }, color: P.green, fontSize: 10, fontFace: "Arial", align: "center", bold: true, margin: [5, 8, 5, 8] } },
      ]);
    });

    // Totals row
    tableRows.push([
      { text: "TOTAL", options: { fill: { color: P.surface2 }, color: P.white, fontSize: 10, fontFace: "Arial", bold: true, margin: [5, 8, 5, 8] } },
      { text: String(totalUnits), options: { fill: { color: P.surface2 }, color: P.white, fontSize: 10, fontFace: "Arial", align: "center", bold: true, margin: [5, 8, 5, 8] } },
      { text: "", options: { fill: { color: P.surface2 }, margin: [5, 8, 5, 8] } },
      { text: fmtFull$(totalMonthly) + "/mo", options: { fill: { color: P.surface2 }, color: P.green, fontSize: 10, fontFace: "Arial", align: "center", bold: true, margin: [5, 8, 5, 8] } },
      { text: fmtFull$(totalMonthly * 12) + "/yr", options: { fill: { color: P.surface2 }, color: P.green, fontSize: 10, fontFace: "Arial", align: "center", bold: true, margin: [5, 8, 5, 8] } },
    ]);

    s4.addTable(tableRows, {
      x: M, y: 1.05, w: CW,
      colW: colWidths4,
      border: { pt: 0.5, color: P.border },
    });
  }

  // ─────────────────────────────────────────────────────────────
  // SLIDE 5: OPERATING STATEMENT
  // ─────────────────────────────────────────────────────────────
  if (data.opStatement && data.opStatement.length > 0) {
    const s5 = pres.addSlide();
    addChrome(s5);
    addTitle(s5, "OPERATING STATEMENT");

    var opHeaders = [
      { text: "", options: { fill: { color: P.red }, color: P.white, bold: true, fontSize: 9, fontFace: "Arial", margin: [4, 8, 4, 8] } },
      { text: "Current", options: { fill: { color: P.red }, color: P.white, bold: true, fontSize: 9, fontFace: "Arial", align: "center", margin: [4, 8, 4, 8] } },
      { text: "Pro Forma", options: { fill: { color: P.red }, color: P.white, bold: true, fontSize: 9, fontFace: "Arial", align: "center", margin: [4, 8, 4, 8] } },
    ];

    var opRows = [opHeaders];
    data.opStatement.forEach(function(row, idx) {
      var isTotal = (row.label || "").toUpperCase().includes("TOTAL") || (row.label || "").toUpperCase().includes("NOI") || (row.label || "").toUpperCase().includes("NET");
      var rowBg = isTotal ? P.surface2 : (idx % 2 === 0 ? P.surface : P.bg);
      var textColor = isTotal ? P.green : P.white;

      opRows.push([
        { text: row.label || "", options: { fill: { color: rowBg }, color: P.white, fontSize: 9, fontFace: "Arial", bold: isTotal, margin: [4, 8, 4, 8] } },
        { text: row.current ? fmtFull$(row.current) : "-", options: { fill: { color: rowBg }, color: textColor, fontSize: 9, fontFace: "Arial", align: "center", bold: isTotal, margin: [4, 8, 4, 8] } },
        { text: row.proforma ? fmtFull$(row.proforma) : "-", options: { fill: { color: rowBg }, color: textColor, fontSize: 9, fontFace: "Arial", align: "center", bold: isTotal, margin: [4, 8, 4, 8] } },
      ]);
    });

    s5.addTable(opRows, {
      x: M, y: 1.05, w: CW,
      colW: [4.4, 2.2, 2.2],
      border: { pt: 0.5, color: P.border },
    });
  }

  // ─────────────────────────────────────────────────────────────
  // SLIDE 6: LOCATION & MARKET
  // ─────────────────────────────────────────────────────────────
  const s6 = pres.addSlide();
  addChrome(s6);
  addTitle(s6, "LOCATION & MARKET");

  var locPoints = data.locationHighlights && data.locationHighlights.length > 0
    ? data.locationHighlights
    : [
      "Located in " + (data.city || "New Orleans, LA"),
      (data.units || 0) + "-unit " + (data.propertyType || "multifamily") + " property",
      "Current occupancy: " + (data.occupancy || 0) + "%",
    ];

  locPoints.forEach(function(pt, i) {
    var ly = 1.1 + i * 0.6;
    s6.addShape(pres.shapes.RECTANGLE, {
      x: M, y: ly, w: CW, h: 0.52,
      fill: { color: i % 2 === 0 ? P.surface : P.bg },
    });
    s6.addShape(pres.shapes.RECTANGLE, {
      x: M, y: ly, w: 0.05, h: 0.52,
      fill: { color: P.red },
    });
    s6.addText(pt, {
      x: M + 0.22, y: ly, w: CW - 0.35, h: 0.52,
      fontSize: 11, fontFace: "Arial", color: P.text, valign: "middle", margin: 0,
    });
  });

  // ─────────────────────────────────────────────────────────────
  // SLIDE 7: INVESTMENT HIGHLIGHTS
  // ─────────────────────────────────────────────────────────────
  const s7 = pres.addSlide();
  addChrome(s7);
  addTitle(s7, "INVESTMENT HIGHLIGHTS");

  var highlights = data.investmentHighlights && data.investmentHighlights.length > 0
    ? data.investmentHighlights
    : [
      "Strong " + (data.capRate || 0) + "% cap rate in a growing market",
      (data.occupancy || 0) + "% occupancy demonstrates stable demand",
      "Value-add opportunity through strategic unit renovations",
    ];

  var hlColors = [P.red, P.blue, P.green, P.amber, P.red, P.blue];
  highlights.forEach(function(hl, i) {
    var hy = 1.1 + i * 0.82;
    var hc = hlColors[i % hlColors.length];

    // Numbered circle
    s7.addShape(pres.shapes.OVAL, {
      x: M, y: hy + 0.1, w: 0.42, h: 0.42, fill: { color: hc },
    });
    s7.addText(String(i + 1), {
      x: M, y: hy + 0.1, w: 0.42, h: 0.42,
      fontSize: 14, fontFace: "Arial Black", color: P.white,
      align: "center", valign: "middle", margin: 0,
    });
    s7.addText(hl, {
      x: M + 0.6, y: hy, w: CW - 0.75, h: 0.62,
      fontSize: 12, fontFace: "Arial", color: P.text, valign: "middle", margin: 0,
    });
  });

  // ─────────────────────────────────────────────────────────────
  // SLIDE 8: CONTACT
  // ─────────────────────────────────────────────────────────────
  const s8 = pres.addSlide();
  addChrome(s8);

  s8.addText("BRIDGEWATER", {
    x: M, y: 0.7, w: CW, h: 0.5,
    fontSize: 16, fontFace: "Arial Black", color: P.red,
    charSpacing: 10, align: "center", margin: 0,
  });
  s8.addText("REALTY ADVISORS", {
    x: M, y: 1.1, w: CW, h: 0.3,
    fontSize: 9, fontFace: "Arial", color: P.muted,
    charSpacing: 8, align: "center", margin: 0,
  });

  s8.addShape(pres.shapes.RECTANGLE, {
    x: W / 2 - 0.6, y: 1.6, w: 1.2, h: 0.04, fill: { color: P.red },
  });

  s8.addText("FOR MORE INFORMATION, PLEASE CONTACT:", {
    x: M, y: 1.85, w: CW, h: 0.3,
    fontSize: 9, fontFace: "Arial", color: P.muted,
    charSpacing: 3, align: "center", margin: 0,
  });

  var contacts = data.contacts && data.contacts.length > 0 ? data.contacts : TEAM;
  var cW = 2.6, cGap = 0.25;
  var cTotalW = contacts.length * cW + (contacts.length - 1) * cGap;
  var cStartX = (W - cTotalW) / 2;

  contacts.forEach(function(c, i) {
    var cx = cStartX + i * (cW + cGap);
    s8.addShape(pres.shapes.RECTANGLE, {
      x: cx, y: 2.45, w: cW, h: 1.7,
      fill: { color: P.surface }, shadow: softShadow(),
    });
